<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>serotonin | browsing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- CORE SCRIPTS -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

        .hover-trigger {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 560px; height: 60px; z-index: 9999;
        }

        .nav-container {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px; z-index: 10000;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
            opacity: 0;
        }

        .hover-trigger:hover + .nav-container, .nav-container:hover {
            bottom: 30px; opacity: 1;
        }

        .url-capsule {
            background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px;
            padding: 8px 20px 8px 10px; display: flex; align-items: center; gap: 15px; width: 450px;
        }

        .url-logo { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .url-logo:hover { opacity: 0.7; }

        #sj-form { flex: 1; display: flex; }
        #sj-address {
            width: 100%; background: transparent; border: none; outline: none;
            color: #888; font-size: 0.95rem; font-family: Arial, sans-serif; text-align: center;
        }

        .controls-capsule {
            background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px;
            padding: 8px 20px; display: flex; align-items: center; gap: 20px;
        }

        .nav-ctrl-btn { background: none; border: none; color: #fff; font-size: 1.1rem; cursor: pointer; }
        #sj-frame { border: none; width: 100vw; height: 100vh; background: #000; position: absolute; top:0; left:0; }
        #sj-search-engine, .page-content { display: none; }
    </style>
</head>
<body>

    <div class="hover-trigger"></div>

    <div class="nav-container">
        <div class="url-capsule">
            <img src="ser.png" class="url-logo" onclick="location.href='index.html'">
            <form id="sj-form">
                <input id="sj-search-engine" value="https://duckduckgo.com/?q=%s" type="hidden" />
                <input id="sj-address" type="text" placeholder="https://url" autocomplete="off" />
            </form>
        </div>

        <div class="controls-capsule">
            <button class="nav-ctrl-btn" onclick="historyBack()"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="nav-ctrl-btn" onclick="historyForward()"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <iframe id="sj-frame"></iframe>

    <script>
        // --- 1. TRANSPORT INITIALIZATION (Fixes WASM Error) ---
        async function initTransport() {
            try {
                const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
                
                // Determine Wisp URL based on current host
                const wispUrl = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/wisp/";
                
                // Set the transport to Libcurl and wait for WASM to load
                await connection.setTransport("/libcurl/index.mjs", [{ wisp: wispUrl }]);
                console.log("Transport initialized successfully with Libcurl.");
            } catch (err) {
                console.error("Failed to initialize transport:", err);
            }
        }

        // --- 2. INITIAL LOAD ---
        window.onload = async () => {
            // Wait for transport first to prevent WASM error
            await initTransport();

            const params = new URLSearchParams(window.location.search);
            const url = params.get('url');
            if (url) {
                proxy(decodeURIComponent(url));
            }
        };

        // --- 3. PROXY FUNCTION ---
        function proxy(url) {
            const addr = document.getElementById('sj-address');
            addr.value = url;
            // Scramjet's script listens for this submit event
            document.getElementById('sj-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
        }

        // --- 4. NAVIGATION CONTROLS ---
        function historyBack() {
            try { document.getElementById('sj-frame').contentWindow.history.back(); } catch (e) {}
        }
        function historyForward() {
            try { document.getElementById('sj-frame').contentWindow.history.forward(); } catch (e) {}
        }

        // --- 5. TAB CLOAK & PANIC ---
        const savedTitle = localStorage.getItem('tabTitle');
        const savedIcon = localStorage.getItem('tabIcon');
        if (savedTitle) document.title = savedTitle;
        if (savedIcon) {
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.href = savedIcon; document.head.appendChild(link);
        }

        window.addEventListener('keydown', (e) => {
            const panicKey = localStorage.getItem('panicKey');
            const panicUrl = localStorage.getItem('panicUrl') || 'https://google.com';
            if (panicKey && e.key === panicKey) {
                window.location.href = panicUrl;
            }
        });
    </script>
</body>
</html>
