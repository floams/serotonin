<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>serotonin | games</title>

    <link rel="shortcut icon" href="favicon.webp" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        @font-face { font-family: 'AwesomeBipolar'; src: url('AwesomeBi_polar-Regular.ttf') format('truetype'); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #1e1e1e url('bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'AwesomeBipolar', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
            color: white;
            overflow-x: hidden;
        }

        .nav-pill {
            position: fixed; top: 30px; display: flex; align-items: center;
            background: #000; padding: 10px 25px; border-radius: 50px; gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
            border: 1px solid #111;
        }
        .nav-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; text-decoration: none; transition: 0.2s; }
        .nav-btn:hover { transform: scale(1.1); }
        .nav-logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

        .page-content {
            text-align: center; width: 100%; max-width: 1100px; padding: 20px;
        }
        .site-title { font-size: 5rem; color: #fff; margin-bottom: 5px; }

        #games {
            width: 100%;
            margin-top: 20px;
            min-height: 600px;
        }

        .desc {
            font-family: Arial, sans-serif; 
            font-size: 1.4rem; 
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px; 
            font-weight: 300; 
        }
    </style>

    <!-- UI Scripts only -->
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
</head>
<body>

    <div class="nav-pill">
        <a href="index.html" class="nav-btn"><img src="ser.png" class="nav-logo"></a>
        <a href="games.html" class="nav-btn"><i class="fa-solid fa-gamepad"></i></a>
        <a href="apps.html" class="nav-btn"><i class="fa-solid fa-table-cells"></i></a>
        <button class="nav-btn" onclick="go('https://indica.bond/')"><i class="fa-solid fa-film"></i></button>
        <button class="nav-btn" onclick="go('https://monochrome.tf')"><i class="fa-solid fa-music"></i></button>
        <a href="settings.html" class="nav-btn"><i class="fa-solid fa-gear"></i></a>
    </div>

    <div class="page-content">
        <h1 class="site-title">games</h1>
        <h1 class="desc">browse our selection of over 1000 games, powered by luminSDK!</h1>
        <div id="games"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js" crossorigin="anonymous"></script>
    <script>
        // Init Lumin
        Lumin.init({
            container: '#games',
            theme: 'dark',
            columns: 12,
            rows: 8,
            gamesPerPage: 96,
            showCatagories: true,
            showRandom: false,
        });

        function go(url) {
            window.location.href = 'iframe.html?url=' + encodeURIComponent(url);
        }

        // Tab Cloaking
        const savedTitle = localStorage.getItem('tabTitle');
        const savedIcon = localStorage.getItem('tabIcon');
        if (savedTitle) document.title = savedTitle;
        if (savedIcon) {
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.href = savedIcon; 
            document.head.appendChild(link);
        }
    </script>
</body>
</html>
