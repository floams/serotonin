<script>
    // 1. Apply Tab Cloaking Disguise
    const savedTitle = localStorage.getItem('tabTitle');
    const savedIcon = localStorage.getItem('tabIcon');
    if (savedTitle) document.title = savedTitle;
    if (savedIcon) {
        let link = document.querySelector("link[rel~='icon']");
        if (link) link.href = savedIcon;
    }

    // 2. Set the Search Engine for the form
    const savedEngine = localStorage.getItem('searchEngine');
    if (savedEngine) {
        document.getElementById('sj-search-engine').value = savedEngine;
    }

    // 3. Panic Key
    document.addEventListener('keydown', function(e) {
        const panicKey = localStorage.getItem('panicKey');
        if (panicKey && e.key === panicKey) {
            window.location.href = 'https://www.google.com';
        }
    });
</script>

<script>
	(function() {
    // 1. Apply Cloak instantly
    const savedTitle = localStorage.getItem('tabTitle');
    const savedIcon = localStorage.getItem('tabIcon');
    if (savedTitle) document.title = savedTitle;
    if (savedIcon) {
        let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.type = 'image/x-icon'; link.rel = 'shortcut icon'; link.href = savedIcon;
        document.getElementsByTagName('head')[0].appendChild(link);
    }

    // 2. Panic Key Logic
    document.addEventListener('keydown', function(e) {
        if (window.location.pathname.includes('settings.html')) return;
        
        const panicKey = localStorage.getItem('panicKey');
        const panicUrl = localStorage.getItem('panicUrl') || 'https://google.com';
        if (panicKey && e.key === panicKey) {
            window.location.href = panicUrl;
        }
    });

    // 3. Auto About:Blank Cloak (Advanced)
    const autoCloak = localStorage.getItem('autoCloak');
    if (autoCloak === 'ab' && window.self === window.top && !window.location.pathname.includes('settings.html')) {
        let win = window.open();
        if (win) {
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            let iframe = win.document.createElement('iframe');
            iframe.style.border = 'none'; iframe.style.width = '100%'; iframe.style.height = '100%';
            iframe.src = window.location.href;
            win.document.body.appendChild(iframe);
            window.location.replace("https://google.com");
        }
    }
})();
</script>

<script>
// Function to update the search bar text based on current state
function syncAddressBar() {
    const addressBar = document.getElementById('sj-address');
    if (!addressBar) return;

    const path = window.location.pathname;
    const isHomeVisible = document.querySelector('.page-content')?.style.display !== 'none';

    if (path.includes('settings.html')) {
        addressBar.value = 'serotonin://settings';
    } else if (path.includes('games.html')) {
        if (isHomeVisible) addressBar.value = 'serotonin://games';
    } else if (path.endsWith('/') || path.includes('index.html')) {
        if (isHomeVisible) addressBar.value = 'serotonin://home';
    }
}

// Intercept search bar submissions
document.getElementById('sj-form').addEventListener('submit', function(e) {
    const input = document.getElementById('sj-address').value.trim().toLowerCase();
    
    if (input === 'serotonin://home') {
        e.preventDefault();
        window.location.href = 'index.html';
    } else if (input === 'serotonin://settings') {
        e.preventDefault();
        window.location.href = 'settings.html';
    } else if (input === 'serotonin://games') {
        e.preventDefault();
        const frame = document.getElementById('sj-frame');
        if (frame) frame.style.display = 'none';
        document.querySelector('.page-content').style.display = 'flex';
        syncAddressBar();
    }
});

window.addEventListener('load', syncAddressBar);
</script>

<script>
(function() {
    const addressBar = document.getElementById('sj-address');
    const form = document.getElementById('sj-form');
    const frame = document.getElementById('sj-frame');
    const content = document.querySelector('.page-content');

    // 1. Handle Navigation & Protocols
    form.addEventListener('submit', function(e) {
        const val = addressBar.value.trim().toLowerCase();
        
        if (val === 'serotonin://home') {
            e.preventDefault();
            e.stopImmediatePropagation();
            window.location.href = 'index.html';
        } 
        else if (val === 'serotonin://settings') {
            e.preventDefault();
            e.stopImmediatePropagation();
            window.location.href = 'settings.html';
        }
        else if (val === 'serotonin://games') {
            e.preventDefault();
            e.stopImmediatePropagation();
            if (frame) frame.style.display = 'none';
            if (content) content.style.display = 'flex';
            addressBar.value = 'serotonin://games';
        }
    }, true); // The "true" here ensures this runs BEFORE other scripts

    function syncBar() {
        if (!frame || frame.style.display === 'none') {
            if (window.location.pathname.includes('games.html')) {
                addressBar.value = 'serotonin://games';
            } else {
                addressBar.value = 'serotonin://home';
            }
        }
    }

    window.addEventListener('load', syncBar);
    window.syncAddressBar = syncBar;
})();
</script>
