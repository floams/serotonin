<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>serotonin</title>
    <link rel="shortcut icon" content="favicon.webp" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @font-face { font-family: 'AwesomeBipolar'; src: url('AwesomeBi_polar-Regular.ttf') format('truetype'); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-color: #1e1e1e;
            font-family: 'AwesomeBipolar', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- LOGIN SCREEN OVERLAY --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: none; /* Controlled by JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }

        .login-logo {
            font-size: 5rem;
            margin-bottom: 5px;
            color: #fff;
            opacity: 0.9;
        }

        .login-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.4rem;
            margin-bottom: 25px;
            color: #e8e8e8;
            font-weight: 300;
        }

        .login-form {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
        }

        .login-input {
            background: #1a1a1a;
            border: 1px solid #222;
            outline: none;
            padding: 12px 25px;
            border-radius: 50px;
            color: #fff;
            width: 320px;
            font-size: 1.1rem;
            font-family: Arial, sans-serif;
        }

        .login-submit {
            background: #1a1a1a;
            border: 1px solid #222;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .login-submit:hover { background: #333; }

        .login-image {
            width: 300px;
            height: auto;
            margin-top: 20px;
        }

        /* --- BASIC STATIC LOADER --- */
        #basic-loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .spinner {
            font-size: 3rem;
            color: #fff;
        }

        /* --- MAIN SITE UI --- */
        .nav-pill {
            position: fixed; top: 30px; display: flex; align-items: center;
            background: #000; padding: 10px 25px; border-radius: 50px; gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .nav-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; text-decoration: none; transition: transform 0.2s; }
        .nav-btn:hover { transform: scale(1.1); }
        .nav-logo { width: 32px; height: 32px; border-radius: 50%; }

        .page-content { text-align: center; width: 100%; max-width: 650px; margin-top: -40px; }
        .site-title { font-size: 5rem; color: #fff; margin-bottom: 5px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .random-msg { font-family: Arial; font-size: 1.4rem; color: #fff; margin-bottom: 40px; font-weight: 300; }

        .search-pill {
            width: 100%; background: #000; border-radius: 50px;
            padding: 18px 35px; box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        #home-search { width: 100%; background: transparent; border: none; outline: none; color: #555; font-size: 1.2rem; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div id="form-container">
            <h1 class="login-logo">serotonin</h1>
            <p class="login-text">please enter the password to enter.</p>
            
            <form class="login-form" id="login-form">
                <input type="password" class="login-input" placeholder="password..." id="password-input" autocomplete="off">
                <button type="submit" class="login-submit">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </form>
        </div>

        <!-- Normal Basic Loading Thing -->
        <div id="basic-loader">
            <i class="fa-solid fa-circle-notch fa-spin spinner"></i>
            <p style="font-family: Arial; font-size: 1rem; color: #aaa;">loading...</p>
        </div>

        <!-- The Smiley Image -->
        <img src="ser.png" class="login-image" alt="serotonin">
    </div>

    <!-- Main Navigation (Site Content) -->
    <div class="nav-pill">
        <button class="nav-btn" onclick="location.reload()"><img src="ser.png" class="nav-logo"></button>
        <a href="games.html" class="nav-btn"><i class="fa-solid fa-gamepad"></i></a>
        <a href="apps.html" class="nav-btn"><i class="fa-solid fa-table-cells"></i></a>
        <button class="nav-btn" onclick="go('https://indica.bond/')"><i class="fa-solid fa-film"></i></button>
        <button class="nav-btn" onclick="go('https://monochrome.tf')"><i class="fa-solid fa-music"></i></button>
        <a href="settings.html" class="nav-btn"><i class="fa-solid fa-gear"></i></a>
    </div>

    <div class="page-content">
        <h1 class="site-title">serotonin</h1>
        <p class="random-msg" id="msg">welcome home.</p>
        <div class="search-pill">
            <form id="search-form">
                <input id="home-search" type="text" placeholder="serotonin://home" autocomplete="off">
            </form>
        </div>
    </div>

    <script>
        // --- LOGIN & LOADER LOGIC ---
        const SITE_PASSWORD = "bolas"; // SET YOUR PASSWORD HERE
        
        const loginScreen = document.getElementById('login-screen');
        const formContainer = document.getElementById('form-container');
        const basicLoader = document.getElementById('basic-loader');
        const loginForm = document.getElementById('login-form');
        const passInput = document.getElementById('password-input');

        function checkAccess() {
            const lastLogin = localStorage.getItem('lastLoginTime');
            const now = Date.now();
            const fiveHours = 5 * 60 * 60 * 1000;

            if (!lastLogin || (now - lastLogin) > fiveHours) {
                loginScreen.style.display = 'flex';
            } else {
                loginScreen.style.display = 'none';
            }
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (passInput.value === SITE_PASSWORD) {
                // Correct Password: Hide the form and show the basic loader
                formContainer.style.display = 'none';
                basicLoader.style.display = 'flex';
                
                // Save login time
                localStorage.setItem('lastLoginTime', Date.now());

                // Briefly show loader then enter site
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                }, 1500); 

            } else {
                alert("Incorrect Password");
                passInput.value = "";
            }
        });

        checkAccess();

        // Dashboard logic
        const phrases = ["the web, but faster.", "welcome home.", "unblock your potential.", "serotonin is all you need."];
        document.getElementById('msg').innerText = phrases[Math.floor(Math.random() * phrases.length)];

        function go(url) {
            window.location.href = 'iframe.html?url=' + encodeURIComponent(url);
        }

        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = document.getElementById('home-search').value.trim();
            if (val) go(val);
        });

        // Tab Cloaking
        const savedTitle = localStorage.getItem('tabTitle');
        const savedIcon = localStorage.getItem('tabIcon');
        if (savedTitle) document.title = savedTitle;
        if (savedIcon) {
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.href = savedIcon; document.head.appendChild(link);
        }
    </script>
</body>
</html>
