<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>serotonin</title>
    <link rel="shortcut icon" content="favicon.webp" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @font-face { font-family: 'AwesomeBipolar'; src: url('AwesomeBi_polar-Regular.ttf') format('truetype'); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-color: #1e1e1e;
            font-family: 'AwesomeBipolar', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- SIMPLE THEMED LOGIN OVERLAY --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1e1e1e;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .login-pill {
            width: 100%;
            max-width: 380px;
            background: #000;
            border-radius: 50px;
            padding: 8px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            border: 1px solid #111;
        }

        .login-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            font-family: Arial, sans-serif;
            padding: 10px;
            text-align: center;
        }

        .login-btn {
            background: none;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .login-btn:hover { color: #fff; }

        /* Hide logic */
        .logged-in #login-screen {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- MAIN SITE UI --- */
        .nav-pill {
            position: fixed; top: 30px; display: flex; align-items: center;
            background: #000; padding: 10px 25px; border-radius: 50px; gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .nav-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; text-decoration: none; transition: transform 0.2s; }
        .nav-btn:hover { transform: scale(1.1); }
        .nav-logo { width: 32px; height: 32px; border-radius: 50%; }

        .page-content { text-align: center; width: 100%; max-width: 650px; margin-top: -40px; }
        .site-title { font-size: 5rem; color: #fff; margin-bottom: 5px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Lower opacity paragraph text */
        .random-msg { 
            font-family: Arial; 
            font-size: 1.4rem; 
            color: rgba(255, 255, 255, 0.4); /* Reduced opacity for that "aesthetic" look */
            margin-bottom: 40px; 
            font-weight: 300; 
        }

        .search-pill {
            width: 100%; background: #000; border-radius: 50px;
            padding: 18px 35px; box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        #home-search { width: 100%; background: transparent; border: none; outline: none; color: #555; font-size: 1.2rem; }
    </style>
</head>
<body>

    <!-- Simplified Login -->
    <div id="login-screen">
        <h1 class="site-title" style="margin-bottom: 25px;">serotonin</h1>
        <form class="login-pill" id="login-form">
            <input type="password" class="login-input" placeholder="enter password..." id="password-input" autocomplete="off">
            <button type="submit" class="login-btn">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </form>
    </div>

    <!-- Main Navigation -->
    <div class="nav-pill">
        <button class="nav-btn" onclick="location.reload()"><img src="ser.png" class="nav-logo"></button>
        <a href="games.html" class="nav-btn"><i class="fa-solid fa-gamepad"></i></a>
        <a href="apps.html" class="nav-btn"><i class="fa-solid fa-table-cells"></i></a>
        <button class="nav-btn" onclick="go('https://indica.bond/')"><i class="fa-solid fa-film"></i></button>
        <button class="nav-btn" onclick="go('https://monochrome.tf')"><i class="fa-solid fa-music"></i></button>
        <a href="settings.html" class="nav-btn"><i class="fa-solid fa-gear"></i></a>
    </div>

    <div class="page-content">
        <h1 class="site-title">serotonin</h1>
        <p class="random-msg" id="msg">im so horny</p>
        <div class="search-pill">
            <form id="search-form">
                <input id="home-search" type="text" placeholder="serotonin://home" autocomplete="off">
            </form>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const SITE_PASSWORD = "bolas"; 
        
        const loginScreen = document.getElementById('login-screen');
        const loginForm = document.getElementById('login-form');
        const passInput = document.getElementById('password-input');

        function checkAccess() {
            const lastLogin = localStorage.getItem('lastLoginTime');
            const now = Date.now();
            const fiveHours = 5 * 60 * 60 * 1000;

            if (lastLogin && (now - lastLogin) < fiveHours) {
                document.body.classList.add('logged-in');
            }
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (passInput.value === SITE_PASSWORD) {
                localStorage.setItem('lastLoginTime', Date.now());
                document.body.classList.add('logged-in');
            } else {
                passInput.value = "";
                passInput.placeholder = "dm @floams on discord for the code";
                setTimeout(() => { passInput.placeholder = "enter password..."; }, 1500);
            }
        });

        checkAccess();

        // Dashboard phrases
        const phrases = ["fuck you contentkeeper", "github.com/floams/serotonin 👀", "the best unblocker of 2026?", "you are such a bully."];
        document.getElementById('msg').innerText = phrases[Math.floor(Math.random() * phrases.length)];

        function go(url) {
            window.location.href = 'iframe.html?url=' + encodeURIComponent(url);
        }

        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = document.getElementById('home-search').value.trim();
            if (val) go(val);
        });

        // Tab Cloaking
        const savedTitle = localStorage.getItem('tabTitle');
        const savedIcon = localStorage.getItem('tabIcon');
        if (savedTitle) document.title = savedTitle;
        if (savedIcon) {
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.href = savedIcon; document.head.appendChild(link);
        }
    </script>
</body>
</html>
